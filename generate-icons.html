<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>生成暹罗猫图标</title>
  <style>
    body{font-family:-apple-system,sans-serif;background:#fdf7ec;color:#5b3a29;padding:24px;text-align:center}
    h1{font-size:20px}
    canvas{border:1px solid #c9a97f;border-radius:16px;margin:10px;background:#fdf7ec}
    button{background:#5b3a29;color:#fff;border:none;padding:12px 24px;border-radius:12px;font-size:16px;margin:8px}
    p{font-size:14px;line-height:1.6}
  </style>
</head>
<body>
  <h1>🐱 生成暹罗猫图标</h1>
  <p>这是一个只需用一次的小工具。<br>点击下方按钮，会自动下载 3 个 PNG 图标文件。<br><b>请把它们放到 <code>icons/</code> 文件夹里</b>（覆盖即可）。</p>

  <div id="previews"></div>

  <button id="genBtn">生成并下载图标</button>

  <script>
    const SIZES = [180, 192, 512];

    async function loadSvg() {
      const res = await fetch('icons/cat.svg');
      return await res.text();
    }

    function svgToImage(svgText, size) {
      return new Promise((resolve) => {
        const svg64 = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgText)));
        const img = new Image();
        img.onload = () => resolve(img);
        img.src = svg64;
      });
    }

    async function genAll() {
      const svg = await loadSvg();
      const previews = document.getElementById('previews');
      previews.innerHTML = '';
      for (const size of SIZES) {
        const canvas = document.createElement('canvas');
        canvas.width = size; canvas.height = size;
        const ctx = canvas.getContext('2d');
        // 圆角米白底
        ctx.fillStyle = '#fdf7ec';
        const r = size * 0.22;
        ctx.beginPath();
        ctx.moveTo(r, 0);
        ctx.arcTo(size, 0, size, size, r);
        ctx.arcTo(size, size, 0, size, r);
        ctx.arcTo(0, size, 0, 0, r);
        ctx.arcTo(0, 0, size, 0, r);
        ctx.closePath();
        ctx.fill();

        const img = await svgToImage(svg, size);
        ctx.drawImage(img, 0, 0, size, size);

        const preview = document.createElement('canvas');
        preview.width = 90; preview.height = 90;
        preview.getContext('2d').drawImage(canvas, 0, 0, 90, 90);
        previews.appendChild(preview);

        // 下载
        canvas.toBlob(blob => {
          const a = document.createElement('a');
          a.download = `icon-${size}.png`;
          a.href = URL.createObjectURL(blob);
          a.click();
        }, 'image/png');
      }
    }

    document.getElementById('genBtn').addEventListener('click', genAll);
  </script>
</body>
</html>
